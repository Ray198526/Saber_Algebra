                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.05);

                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.05);

                osc.start();
                osc.stop(ctx.currentTime + 0.05);

        // Renderizado del Libro de Sesiones

            let session = null;
            let chapter = null;

                    session = s;
                    chapter = ch;
                    break;
                }
            }

            const fontClasses = {
                1: { text: "text-sm", title: "text-lg", dialogue: "text-sm", math: "text-sm" },
                2: { text: "text-base", title: "text-xl sm:text-2xl", dialogue: "text-base sm:text-lg", math: "text-sm sm:text-base" },
                3: { text: "text-lg sm:text-xl", title: "text-2xl sm:text-3xl", dialogue: "text-lg sm:text-xl", math: "text-base sm:text-lg" },

                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                            </button>
                        ` : ''}
                        <div class="text-xs font-bold truncate max-w-[150px] sm:max-w-md ${state.projectorMode ? 'text-slate-300' : 'text-slate-500'}">

                    </div>
                    <div class="text-[10px] sm:text-xs font-extrabold text-amber-600 bg-amber-100 px-3 py-1 rounded-full shrink-0 max-w-[150px] truncate">

                        </div>

                        <!-- Recordatorio de Sesión Anterior -->
                        ${session.reminder ? `
                            <div class="border rounded-3xl p-4 sm:p-6 flex flex-col gap-4 shadow-sm animate-fade-in ${
                                state.projectorMode ? 'bg-zinc-950 border-amber-500/50 text-white' : 'bg-amber-50 border-amber-200 text-slate-800'

                            ${session.dialogue.map((msg, idx) => {

                                return `

                                        <div class="flex flex-col items-center shrink-0 z-10">

                                            isSocrates 
                                                ? (state.projectorMode ? 'bg-amber-950/20 text-amber-100 border-amber-900/50 rounded-tl-none font-medium' : 'bg-amber-50/70 text-amber-950 border-amber-200/40 rounded-tl-none') 
                                                : (state.projectorMode ? 'bg-blue-950/20 text-blue-100 border-blue-900/50 rounded-tr-none font-medium' : 'bg-blue-50/70 text-blue-950 border-blue-200/40 rounded-tr-none')

                        <div id="reto-baldor-container">

                        </div>

                    </div>
                </div>
            `;

            if (state.activeSessionId === 11) renderSession11Widget();
            if (state.activeSessionId === 12) renderSession12Widget();
            renderRetoBaldor();
        }

        // Render del mini-desafío del recordatorio (Optimizada tipografía e inputs para móvil)
        function renderReminderSubWidget() {
            const isS11 = state.activeSessionId === 11;
            const checked = state.reminderChecked[state.activeSessionId];
            const answers = state.reminderAnswers[state.activeSessionId];

            const q1Label = isS11 ? "Simplifica: 3x + 4x =" : "Simplifica: 8x - 2y - 3x =";
            const q2Label = isS11 ? "¿Son semejantes 2a y 2b? (si/no)" : "Simplifica: 4m + 5 - 2m =";

            const q1Correct = isS11 
                ? (answers.q1.replace(/\s+/g, '').toLowerCase() === "7x")
                : ["5x-2y", "-2y+5x"].includes(answers.q1.replace(/\s+/g, '').toLowerCase());

            const q2Correct = isS11
                ? (answers.q2.replace(/\s+/g, '').toLowerCase() === "no")
                : ["2m+5", "5+2m"].includes(answers.q2.replace(/\s+/g, '').toLowerCase());

            return `
                <div class="mt-2 p-3 sm:p-4 rounded-2xl border ${
                    state.projectorMode ? 'bg-black/60 border-zinc-800 text-white' : 'bg-white/85 border-amber-200 text-slate-800'
                }">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-base">⚡</span>
                        <h5 class="font-extrabold text-[11px] uppercase tracking-wider">Mini-desafío de repaso rápido:</h5>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        
                        <!-- Pregunta 1 -->
                        <div class="p-3 rounded-xl border flex flex-col gap-1.5 ${state.projectorMode ? 'bg-zinc-900/40 border-zinc-800' : 'bg-amber-50/40 border-amber-100'}">
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wide">Pregunta 1</span>
                            <p class="font-bold text-sm">${q1Label}</p>
                            <div class="flex items-center gap-2 relative mt-1">
                                <input 
                                    type="text"
                                    placeholder="Respuesta..."
                                    ${checked ? 'disabled' : ''}
                                    value="${answers.q1}"
                                    oninput="state.reminderAnswers[${state.activeSessionId}].q1 = this.value"
                                    class="w-full px-3 py-2 rounded-lg border text-base font-mono focus:outline-none ${
                                        state.projectorMode ? 'bg-black text-white focus:border-amber-400' : 'bg-white text-slate-900 focus:border-amber-500'
                                    } ${
                                        checked ? (q1Correct ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400' : 'border-rose-500 bg-rose-500/10 text-rose-400') : 'border-slate-300'
                                    }"
                                />
                                ${checked ? `<span class="absolute right-3 top-2.5 text-sm font-black">${q1Correct ? '✓' : '✗'}</span>` : ''}
                            </div>
                        </div>

                        <!-- Pregunta 2 -->
                        <div class="p-3 rounded-xl border flex flex-col gap-1.5 ${state.projectorMode ? 'bg-zinc-900/40 border-zinc-800' : 'bg-amber-50/40 border-amber-100'}">
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wide">Pregunta 2</span>
                            <p class="font-bold text-sm">${q2Label}</p>
                            <div class="flex items-center gap-2 relative mt-1">
                                <input 
                                    type="text"
                                    placeholder="Respuesta..."
                                    ${checked ? 'disabled' : ''}
                                    value="${answers.q2}"
                                    oninput="state.reminderAnswers[${state.activeSessionId}].q2 = this.value"
                                    class="w-full px-3 py-2 rounded-lg border text-base font-mono focus:outline-none ${
                                        state.projectorMode ? 'bg-black text-white focus:border-amber-400' : 'bg-white text-slate-900 focus:border-amber-500'
                                    } ${
                                        checked ? (q2Correct ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400' : 'border-rose-500 bg-rose-500/10 text-rose-400') : 'border-slate-300'
                                    }"
                                />
                                ${checked ? `<span class="absolute right-3 top-2.5 text-sm font-black">${q2Correct ? '✓' : '✗'}</span>` : ''}
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-2 mt-3">
                        ${checked ? `
                            <button onclick="resetReminder()" class="px-4 py-2 bg-slate-800 text-slate-300 hover:text-white rounded-lg text-xs font-bold transition cursor-pointer">
                                Intentar de nuevo
                            </button>
                        ` : `
                            <button onclick="checkReminder()" class="px-5 py-2 bg-amber-500 hover:bg-amber-400 text-slate-950 rounded-lg text-xs font-black transition shadow-sm cursor-pointer">
                                Verificar Repaso
                            </button>
                        `}
                    </div>
                </div>
            `;
        }

        // Widgets de agrupación visual (Sesión 11) - Optimizado touch y tap
        function renderSession11Widget() {
            const container = document.getElementById("s11-widget-container");
            if (!container) return;

            const activeProb = s11Problems[state.s11ActiveProbIdx];
            const isAllSorted = activeProb.terms.every(t => !!state.s11Assignments[t.id]);

            container.innerHTML = `
                <div class="rounded-3xl p-4 sm:p-6 border shadow-xl relative overflow-hidden transition-all ${
                    state.projectorMode ? 'bg-zinc-950 border-zinc-800 text-white' : 'bg-white border-slate-200 text-slate-800'
                }">
                    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2 border-b border-slate-700/30 pb-4 mb-6 relative z-10">

                                <span>🧠 Agrupación de Términos</span>
                                <span class="bg-amber-100 text-amber-800 text-[10px] font-black px-2 py-0.5 rounded-full">
                                    Nivel ${activeProb.id}/5
                                </span>
                            </h4>
                        </div>
                    </div>

                    <div class="space-y-6 animate-fade-in">
                        <div class="p-4 rounded-2xl bg-indigo-50/50 border border-indigo-100 text-center relative text-slate-950">

                            <p class="text-indigo-950 text-xs sm:text-sm font-medium italic mb-2">"${activeProb.description}"</p>
                            <div class="text-2xl sm:text-3xl font-extrabold font-mono text-indigo-900">${activeProb.expression}</div>

                        <!-- Tarjetas (Aumentada usabilidad móvil) -->
                        <div class="text-center space-y-3">
                            <span class="text-xs font-black uppercase text-slate-500 tracking-wider">
                                ${isAllSorted ? "🎉 ¡Bien hecho! Completa la fase final:" : "Paso 1: Toca un término y luego selecciona su contenedor abajo"}
                            </span>
                            <div class="flex flex-wrap gap-2.5 justify-center py-2">
                                ${activeProb.terms.map(term => {
                                    const isSorted = !!state.s11Assignments[term.id];
                                    const isSelected = state.s11SelectedTermId === term.id;
                                    return `
                                        <button
                                            id="${term.id}"
                                            ${isSorted ? 'disabled' : ''}
                                            onclick="handleS11SelectTerm('${term.id}')"
                                            class="px-5 py-3 rounded-xl font-mono text-xl sm:text-2xl font-black transition-all border-2 transform cursor-pointer relative shadow-sm touch-manipulation ${
                                                isSorted 
                                                    ? 'bg-slate-100 border-slate-200 text-slate-300 opacity-20 scale-90' 
                                                    : isSelected 
                                                        ? 'bg-amber-400 border-amber-500 text-slate-950 scale-105 ring-4 ring-amber-400/20 font-extrabold'

                                            ${term.label}
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- Contenedores -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2">
                            ${activeProb.bins.map(bin => {
                                const termsInBin = activeProb.terms.filter(t => state.s11Assignments[t.id] === bin.key);
                                return `
                                    <div 
                                        onclick="handleS11PlaceInBin('${bin.key}')"
                                        class="rounded-2xl border-2 p-4 flex flex-col justify-between min-h-[140px] transition-all relative group cursor-pointer touch-manipulation ${bin.color} ${
                                            state.s11SelectedTermId ? 'hover:scale-[1.01] border-dashed ring-2 ring-amber-500/20' : ''
                                        }"
                                    >
                                        <h5 class="text-sm sm:text-base font-black tracking-wide mb-2 flex justify-between items-center">
                                            <span>${bin.title}</span>
                                            <span class="text-xs font-semibold opacity-70">(${termsInBin.length})</span>
                                        </h5>
                                        <div class="flex flex-wrap gap-2 items-center min-h-[44px]">
                                            ${termsInBin.map(t => `<span class="px-2.5 py-1 bg-slate-950/40 rounded-lg font-mono text-base font-black border border-slate-800">${t.label}</span>`).join('')}
                                            ${termsInBin.length === 0 ? '<span class="text-slate-500 text-xs italic">Toca aquí para clasificar...</span>' : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>

                        <!-- Fase 2 de reducción -->
                        ${isAllSorted ? `
                            <div class="p-4 sm:p-6 rounded-2xl bg-slate-950 border border-slate-800 animate-fade-in space-y-6">
                                <div class="text-center text-white">
                                    <span class="text-xs font-black uppercase text-amber-500 tracking-wider">Paso 2: Suma o resta los términos de cada bote</span>
                                </div>
                                <div class="flex flex-col gap-4 items-center justify-center text-white">
                                    ${activeProb.bins.map(bin => {
                                        const val = state.s11ReductionAnswers[bin.key] || '';
                                        const correct = val.replace(/\s+/g, '').toLowerCase() === activeProb.solutions[bin.key].toLowerCase();
                                        return `
                                            <div class="flex items-center gap-3 w-full max-w-xs justify-between">
                                                <span class="text-slate-400 font-extrabold text-sm uppercase">Suma ${bin.key}:</span>
                                                <input 
                                                    type="text"
                                                    value="${val}"
                                                    oninput="handleS11InputChange('${bin.key}', this.value)"
                                                    class="w-36 bg-slate-900 border-2 rounded-lg px-3 py-2 text-center font-mono text-base focus:outline-none focus:border-amber-400 ${
                                                        state.s11ShowInputFeedback ? (correct ? 'border-emerald-500 text-emerald-400' : 'border-rose-500 text-rose-400') : 'border-slate-800'
                                                    }"
                                                    placeholder="..."
                                                />
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                                <div class="text-center pt-2">
                                    <button onclick="checkS11Reduction()" class="w-full sm:w-auto px-8 py-3 bg-amber-500 hover:bg-amber-400 text-slate-950 font-black rounded-xl text-sm transition shadow-lg cursor-pointer">
                                        Verificar Solución
                                    </button>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // Widgets de agrupación visual con exponentes (Sesión 12)
        function renderSession12Widget() {
            const container = document.getElementById("s12-widget-container");
            if (!container) return;

            const activeProb = s12Problems[state.s12ActiveProbIdx];
            const isAllSorted = activeProb.terms.every(t => !!state.s12Assignments[t.id]);

            container.innerHTML = `
                <div class="rounded-3xl p-4 sm:p-6 border shadow-xl relative overflow-hidden transition-all ${
                    state.projectorMode ? 'bg-zinc-950 border-zinc-800 text-white' : 'bg-white border-slate-200 text-slate-800'
                }">
                    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2 border-b border-slate-700/30 pb-4 mb-6 relative z-10">
                        <div>
                            <h4 class="text-lg sm:text-2xl font-black text-rose-500 flex items-center gap-2">
                                <span>🧬 Desafío Exponencial</span>
                                <span class="bg-rose-100 text-rose-800 text-[10px] font-black px-2.5 py-0.5 rounded-full">
                                    Nivel ${activeProb.id}/5
                                </span>
                            </h4>
                        </div>
                    </div>

                    <div class="space-y-6 animate-fade-in">
                        <div class="p-4 rounded-2xl bg-rose-50/50 border border-rose-100 text-center relative text-slate-950">
                            <span class="absolute -top-3 left-4 bg-rose-500 text-white px-3 py-0.5 rounded-full text-[9px] font-black uppercase tracking-wider">Sócrates:</span>
                            <p class="text-rose-950 text-xs sm:text-sm font-medium italic mb-2">"${activeProb.description}"</p>
                            <div class="text-2xl sm:text-3xl font-extrabold font-mono text-rose-900">${activeProb.expression}</div>
                        </div>

                        <!-- Tarjetas -->
                        <div class="text-center space-y-3">
                            <span class="text-xs font-black uppercase text-slate-500 tracking-wider">
                                ${isAllSorted ? "🎉 ¡Todo clasificado! Ahora resuelve:" : "Paso 1: Toca una tarjeta y pulsa su contenedor correspondiente abajo"}
                            </span>
                            <div class="flex flex-wrap gap-2.5 justify-center py-2">
                                ${activeProb.terms.map(term => {
                                    const isSorted = !!state.s12Assignments[term.id];
                                    const isSelected = state.s12SelectedTermId === term.id;
                                    return `
                                        <button
                                            id="${term.id}"
                                            ${isSorted ? 'disabled' : ''}
                                            onclick="handleS12SelectTerm('${term.id}')"
                                            class="px-5 py-3 rounded-xl font-mono text-xl sm:text-2xl font-black transition-all border-2 transform cursor-pointer relative shadow-sm touch-manipulation ${
                                                isSorted 
                                                    ? 'bg-slate-100 border-slate-200 text-slate-300 opacity-20 scale-90' 
                                                    : isSelected 
                                                        ? 'bg-rose-400 border-rose-500 text-slate-950 scale-105 ring-4 ring-rose-400/20' 
                                                        : 'bg-slate-850 border-slate-700 text-slate-100 hover:bg-slate-800'
                                            }"
                                        >
                                            ${term.label}
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- Contenedores -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2">
                            ${activeProb.bins.map(bin => {
                                const termsInBin = activeProb.terms.filter(t => state.s12Assignments[t.id] === bin.key);
                                return `
                                    <div 
                                        onclick="handleS12PlaceInBin('${bin.key}')"
                                        class="rounded-2xl border-2 p-4 flex flex-col justify-between min-h-[140px] transition-all relative group cursor-pointer touch-manipulation ${bin.color} ${
                                            state.s12SelectedTermId ? 'hover:scale-[1.01] border-dashed ring-2 ring-rose-500/20' : ''
                                        }"
                                    >
                                        <h5 class="text-sm sm:text-base font-black tracking-wide mb-2 flex justify-between items-center">
                                            <span>${bin.title}</span>
                                            <span class="text-xs font-semibold opacity-70">(${termsInBin.length})</span>
                                        </h5>
                                        <div class="flex flex-wrap gap-2 items-center min-h-[44px]">
                                            ${termsInBin.map(t => `<span class="px-2.5 py-1 bg-slate-950/40 rounded-lg font-mono text-base font-black border border-slate-800">${t.label}</span>`).join('')}
                                            ${termsInBin.length === 0 ? '<span class="text-slate-500 text-xs italic">Toca aquí para clasificar...</span>' : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>

                        <!-- Reducción -->
                        ${isAllSorted ? `
                            <div class="p-4 sm:p-6 rounded-2xl bg-slate-950 border border-slate-800 animate-fade-in space-y-6">
                                <div class="text-center text-white">
                                    <span class="text-xs font-black uppercase text-rose-500 tracking-wider">Paso 2: Simplifica resolviendo las operaciones de cada bote</span>
                                    <p class="text-[10px] text-slate-400 mt-1">Usa formato estándar de exponentes (ej: x^2).</p>
                                </div>
                                <div class="flex flex-col gap-4 items-center justify-center text-white">
                                    ${activeProb.bins.map(bin => {
                                        const val = state.s12ReductionAnswers[bin.key] || '';
                                        const solutions = activeProb.solutions[bin.key];
                                        const correct = solutions.some(ans => ans.replace(/\s+/g, '').toLowerCase() === val.replace(/\s+/g, '').toLowerCase());
                                        return `
                                            <div class="flex items-center gap-3 w-full max-w-xs justify-between">
                                                <span class="text-slate-400 font-extrabold text-sm uppercase">Suma ${bin.key}:</span>
                                                <input 
                                                    type="text"
                                                    value="${val}"
                                                    oninput="handleS12InputChange('${bin.key}', this.value)"
                                                    class="w-36 bg-slate-900 border-2 rounded-lg px-3 py-2 text-center font-mono text-base focus:outline-none focus:border-rose-400 ${
                                                        state.s12ShowInputFeedback ? (correct ? 'border-emerald-500 text-emerald-400' : 'border-rose-500 text-rose-400') : 'border-slate-800'
                                                    }"
                                                    placeholder="..."
                                                />
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                                <div class="text-center pt-2">
                                    <button onclick="checkS12Reduction()" class="w-full sm:w-auto px-8 py-3 bg-rose-500 hover:bg-rose-400 text-slate-950 font-black rounded-xl text-sm transition shadow-lg cursor-pointer">
                                        Verificar Solución
                                    </button>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // Renderizado del Reto de Baldor Principal de la Sesión
        function renderRetoBaldor() {
            const container = document.getElementById("reto-baldor-container");
            if (!container) return;

            let session = null;
            for (const ch of algebraData) {
                const s = ch.sessions.find(x => x.id === state.activeSessionId);
                if (s) { session = s; break; }
            }

            // Validar si requiere completado interactivo
            if (state.activeSessionId === 11 && !state.isSession11InteractiveCompleted) {
                container.innerHTML = `
                    <div class="p-6 rounded-2xl bg-slate-900 text-slate-400 border border-slate-800 text-center animate-fade-in text-sm">
                        🔒 Completa el desafío de clasificación visual de Sócrates arriba para desbloquear el Reto de Baldor.
                    </div>
                `;
                return;
            }

            if (state.activeSessionId === 12 && !state.isSession12InteractiveCompleted) {
                container.innerHTML = `
                    <div class="p-6 rounded-2xl bg-slate-900 text-slate-400 border border-slate-800 text-center animate-fade-in text-sm">
                        🔒 Completa el desafío exponencial de Sócrates arriba para desbloquear el Reto de Baldor.
                    </div>
                `;
                return;
            }

            const showResult = state.showResults[state.activeSessionId];
            const userAnsMap = state.userAnswers[state.activeSessionId] || {};

            container.innerHTML = `
                <div class="rounded-3xl p-4 sm:p-8 shadow-xl relative border animate-fade-in ${
                    state.projectorMode ? 'bg-black border-zinc-800 text-white' : 'bg-slate-900 text-white border-slate-800'
                }">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-slate-800 pb-4">
                        <div>
                            <h3 class="text-lg sm:text-2xl font-black flex items-center gap-2 text-amber-400">
                                <span>✏️ Reto de Baldor</span>
                            </h3>
                            ${session.instruction ? `<p class="text-slate-400 mt-1 text-xs sm:text-sm">${session.instruction}</p>` : ''}
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <button onclick="resetBookSession()" class="flex-1 sm:flex-none justify-center flex items-center gap-2 px-4 py-2.5 rounded-xl bg-slate-800 text-slate-300 hover:bg-slate-700 transition text-xs cursor-pointer">
                                <span>Limpiar</span>
                            </button>
                            <button onclick="checkBookSession()" class="flex-1 sm:flex-none justify-center flex items-center gap-2 px-5 py-2.5 rounded-xl bg-amber-500 text-slate-950 font-black hover:bg-amber-400 transition text-xs cursor-pointer">
                                <span>Calificar</span>
                            </button>
                        </div>
                    </div>

                    <!-- Grilla de Ejercicios -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${session.exercises.map((ex, idx) => {
                            const val = userAnsMap[idx] || '';
                            const isCorrect = isAnswerCorrect(val, ex.a);
                            return `
                                <div class="flex items-center justify-between p-3 rounded-xl border transition-all gap-2 ${
                                    state.projectorMode ? 'bg-zinc-950 border-zinc-800' : 'bg-slate-800/40 border-slate-800 hover:bg-slate-800/85'
                                }">
                                    <div class="flex gap-2 items-center min-w-0">
                                        <span class="text-amber-500 font-black text-sm">${idx + 1}.</span>
                                        <span class="font-semibold text-sm truncate ${state.projectorMode ? 'text-white' : 'text-slate-200'}">${ex.q}</span>
                                    </div>
                                    <div class="flex items-center gap-2 relative shrink-0">
                                        <input 
                                            type="text" 
                                            value="${val}"
                                            oninput="handleBookInputChange(${idx}, this.value)"
                                            ${showResult ? 'disabled' : ''}
                                            class="w-28 bg-slate-900 border rounded-lg px-2 py-2 text-center font-mono text-base focus:outline-none ${
                                                !showResult ? 'border-slate-600 focus:border-amber-400 text-white' : ''
                                            } ${
                                                showResult ? (isCorrect ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400 font-bold' : 'border-rose-500 bg-rose-500/10 text-rose-400 font-bold') : ''
                                            }"
                                            placeholder="..."
                                        />
                                        ${showResult ? `<span class="absolute -right-4 font-black text-sm ${isCorrect ? 'text-emerald-400' : 'text-rose-400'}">${isCorrect ? '✓' : '✗'}</span>` : ''}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- Mensaje de feedback general -->
                    ${showResult ? `
                        <div class="mt-6 p-4 rounded-xl bg-slate-850 border border-slate-700 text-center animate-fade-in">
                            <h4 class="text-lg font-bold text-amber-400 mb-1">¡Revisión Completada! 🎉</h4>
                            <p class="text-slate-300 text-xs">¡Excelente esfuerzo! Continúa con la siguiente sesión para seguir aprendiendo.</p>
                        </div>
                    ` : ''}

                    <!-- Sección de Metacognición -->
                    ${session.metacognitive ? `
                        <div class="mt-6 p-4 sm:p-5 rounded-2xl bg-indigo-950/40 border border-indigo-500/30 text-left animate-fade-in relative overflow-hidden">
                            <h4 class="text-sm sm:text-base font-bold text-indigo-300 mb-2 flex items-center gap-2">Pregunta de Reflexión Metacognitiva:</h4>
                            <ul class="space-y-2 text-indigo-100 text-xs sm:text-sm leading-relaxed">
                                ${session.metacognitive.map(q => `<li>• ${q}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}

                </div>

                <!-- Botón de Siguiente Sesión -->
                ${showResult && state.activeSessionId < 30 ? `
                    <div class="flex justify-end mt-4 animate-fade-in">
                        <button onclick="nextSession()" class="w-full sm:w-auto justify-center flex items-center gap-2 px-6 py-3.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl transition shadow-md border border-slate-700/50 cursor-pointer text-sm font-bold">
                            <span>Siguiente Sesión</span>
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                    </div>
                ` : ''}
            `;
        }

        // --- MANEJADORES DE ESTADO ADICIONALES ---
        function changeFontSize(dir) {
            getAudioContext();
            state.fontSizeLevel = Math.max(1, Math.min(4, state.fontSizeLevel + dir));
            render();
        }

        function toggleProjectorMode() {
            getAudioContext();
            state.projectorMode = !state.projectorMode;
            if (state.projectorMode) state.fontSizeLevel = 4; // Letras gigantes en proyector
            else state.fontSizeLevel = 2;
            render();
        }

        function toggleBookSidebar() {
            getAudioContext();
            state.bookSidebarOpen = !state.bookSidebarOpen;
            render();
        }

        function selectSession(id) {
            getAudioContext();
            state.activeSessionId = id;
            state.isSession11InteractiveCompleted = false;
            state.isSession12InteractiveCompleted = false;
            
            // Auto-cerrar sidebar en móvil al seleccionar tema
            if (window.innerWidth < 1024) {
                state.bookSidebarOpen = false;
            }
            render();
        }

        function nextSession() {
            getAudioContext();
            state.activeSessionId = Math.min(30, state.activeSessionId + 1);
            state.isSession11InteractiveCompleted = false;
            state.isSession12InteractiveCompleted = false;
            render();
        }

        // Ejecutar inmediatamente para evitar que fallos de red en window.onload bloqueen la carga en iOS/Safari
        render();
    </script>
</body>
</html>
